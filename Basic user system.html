<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User System</title>
</head>
<body>

<h2>Building Basic User System</h2>

<script>
class Student {
    constructor(name, age, email) {
        this.name = name;
        this.age = age;
        this.email = email;
    }
    getName() {
        return this.name;
    }
    getAge() {
        return this.age;
    }
    getEmail() {
        return this.email;
    }
    setEmail(newEmail) {
        if (newEmail.includes("@")) {
            this.email = newEmail;
            console.log("New email is successfully updated");
        } else {
            console.log("Invalid email format");
        }
    }
}

let student1 = new Student("Aniesh", 21, "aniesh@gmail.com");
student1.setEmail("anieshj@gamil.com");

console.log("Name:", student1.getName());
console.log("Age:", student1.getAge());
console.log("Email:", student1.getEmail());
</script>

</body>
</html>
