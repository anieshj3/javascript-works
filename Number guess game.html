<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Guess the number game</h2>
    <button onclick="startgame()">Start game</button>
    <p id="output"></p>
    <script>
        function startgame(){
            let chances=0;
            let message="";

            while(chances<5) {
                let num=Number(prompt("Enter a number between 1 to 5"));
                if(num<1 ||num>5){
                    message+="Invalid input<br>";
                    continue;
                }
                chances++;
                switch(num){
                    case 1:
                        message+="You entered: one<br>";
                        break;
                    case 2:
                       message+="You entered:Two<br>";
                       break;
                    case 3:
                        message+="You entered:Three<br>";
                        break;
                    case 4:
                        message+="You entered:Four<br>";
                        break;
                    case 5:
                        message+="You entered:Five<br>";
                        break;           
                    }
                    if(num==3){
                        message+="You guessed it right!<br>";
                        break;
                    }else{
                        message+="wrong guess.Try again.<br>";
                    }
                }
                if(chances==5){
                    message+="Game over";
                }
                document.getElementById("output").innerHTML=message;
        }
    </script>
</body>
</html>
