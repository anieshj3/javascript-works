<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Text App</title>
  <style>
    #output {
      color: blue;
      font-size: 20px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h2>Enter Text</h2>

  <!-- Form -->
  <form id="textForm">
    <input type="text" id="textInput" placeholder="Type something..." required>
    <button type="submit">Submit</button>
  </form>

  <!-- Paragraph -->
  <p id="output"></p>

  <script>
    const form = document.getElementById("textForm");
    const input = document.getElementById("textInput");
    const output = document.getElementById("output");

    // Prevent page reload and show text
    form.addEventListener("submit", function(event) {
      event.preventDefault(); // Prevent reload
      output.textContent = input.value;
      output.style.color = "blue";
    });

    // Hover effect (green)
    output.addEventListener("mouseover", function() {
      output.style.color = "green";
    });

    // Mouse out (back to blue)
    output.addEventListener("mouseout", function() {
      output.style.color = "blue";
    });
  </script>

</body>
</html>
